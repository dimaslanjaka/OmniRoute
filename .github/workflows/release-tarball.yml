name: Build Release Tarball

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Least-privilege default: read-only; workflow only writes releases,
# so grant contents: write.
permissions:
  contents: write

# Avoid concurrent runs clobbering the same release.
concurrency:
  group: release-tarball
  cancel-in-progress: false

jobs:
  build-tarball:
    name: Download and publish release tarball
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download omniroute-tarball from CI workflow
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: ./release

      - name: Verify tarball contents
        run: |
          ls -la release/
          tar -tzf release/omniroute.tgz | head -20

      - name: Verify tarball install CLI
        run: |
          set -euo pipefail
          npm exec --yes --package ./release/omniroute.tgz omniroute --help 2>&1 | tee /tmp/omniroute-help.txt
          grep -qi "usage" /tmp/omniroute-help.txt

      - name: Checkout (for git commands)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create/update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="ci-build"

          # Delete previous release and associated tag.
          # Safe because release is purely an artifact.
          # (Ignore errors on first run when release doesn't exist)
          gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true

          # Extra safety: ensure tag is gone even if it existed without a release
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # Recreate release at current commit with new tarball.
          # Download URL will be:
          # https://github.com/OWNER/REPO/releases/download/ci-build/omniroute.tgz
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "CI Build ($(date +%Y-%m-%d))" \
            --notes "Automated build from commit [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            ./release/omniroute.tgz
