name: Build Release Tarball

on:
  push:
    branches: [main]
  schedule:
    # Rebuild the raw install tarball once per day at 01:00 UTC.
    - cron: "0 1 * * *"
  workflow_dispatch:

# Least-privilege default: read-only; this workflow only writes releases,
# so we grant contents: write.
permissions:
  contents: write

# Avoid concurrent runs clobbering the same release.
concurrency:
  group: release-tarball
  cancel-in-progress: false

jobs:
  build-tarball:
    name: Build and publish release tarball
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CACHE_PATHS: |
        coverage/
        logs/
        node_modules/
        tmp/
        .build/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so npm can compute the package version
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Mirror of dimaslanjaka/nodejs-package-types build-release cache pattern
      # (lines ~190-210): restore cached build/install folders before install,
      # then save them after build/pack for subsequent runs.
      - name: "💾 Restore cache"
        uses: actions/cache/restore@v4
        id: cache
        with:
          path: ${{ env.CACHE_PATHS }}
          key: ${{ runner.os }}-${{ hashFiles('**/package-lock.json', 'src/**/*.{js,ts,tsx,mjs,cjs}', 'open-sse/**/*.{js,ts,mjs,cjs}', 'scripts/**/*.{js,ts,mjs,cjs}', 'tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build CLI payload
        # Builds dist/ + assembles the standalone bundle expected by the
        # `files` whitelist in package.json (bin/, dist/, @omniroute/, ...).
        run: npm run build:release
        env:
          # Keep logs in CI to a minimum
          CI: "true"

      - name: Pack tarball
        # The tarball is written to a local temp folder; it is NOT committed.
        run: |
          mkdir -p release
          # `npm pack` writes <name>-<version>.tgz to cwd by default.
          # We rename it to a stable, predictable name so consumers can
          # pin it without having to know the version in advance.
          npm pack --silent --pack-destination ./release
          mv "release/omniroute-$(node -p "require('./package.json').version").tgz" release/omniroute.tgz
          ls -lh release/

      - name: Verify tarball install and CLI
        run: |
          set -euo pipefail
          # This is the local-file equivalent of:
          # npx -y omniroute@https://github.com/dimaslanjaka/OmniRoute/releases/download/ci-build/omniroute.tgz
          npm exec --yes --package ./release/omniroute.tgz -- omniroute --help 2>&1 | tee /tmp/omniroute-help.txt
          grep -qi "usage" /tmp/omniroute-help.txt

      - name: "💾 Save cache"
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CACHE_PATHS }}
          key: ${{ steps.cache.outputs.cache-primary-key }}

      - name: "🧹 Leave last github cache entry"
        continue-on-error: true
        run: npx --legacy-peer-deps -y
          binary-collections@https://github.com/dimaslanjaka/bin/raw/9688287aecab1a125de2d63fdd30651017a9862e/releases/bin.tgz
          --repo "${{ github.repository }}" --sha "${{ github.sha }}"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="ci-build"

          # Delete the previous release and its associated tag.
          # This is safe because the release is purely a CI artifact.
          # (ignore errors on first run when the release does not yet exist)
          gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true
          # Extra safety: ensure the tag is gone even if it existed without a release
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # Recreate the release at the current commit with the new tarball.
          # The download URL never changes:
          # https://github.com/OWNER/REPO/releases/download/ci-build/omniroute.tgz
          gh release create "$TAG" \
            --target ${{ github.sha }} \
            --title "CI Build ($(date +%Y-%m-%d))" \
            --notes "Automated build from commit \`${{ github.sha }}\`." \
            ./release/omniroute.tgz
