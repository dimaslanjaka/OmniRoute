name: Build Release Tarball

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege default: read-only; this workflow only writes releases,
# so we grant contents: write.
permissions:
  contents: write

# Avoid concurrent runs clobbering the same release.
concurrency:
  group: release-tarball
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------
  # 1. Build the better-sqlite3 native binary on each target platform.
  # ------------------------------------------------------------------
  prebuild-native:
    name: Prebuild better-sqlite3 (${{ matrix.os }})
    strategy:
      # Keep going if one OS fails so we still get the other prebuild.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # On Windows, better-sqlite3 also ships prebuilt binaries via prebuildify
      # (node-pre-gyp). If the npm-installed package already has a matching
      # prebuilt binary we can just use it. Force a from-source rebuild only
      # if no prebuilt binary matches — this saves ~5 min on Windows.
      - name: Check if native binary already matches runner
        id: check-binary
        shell: bash
        run: |
          set -euo pipefail
          NODE_FILE=""
          # 1. First try the standard post-install location
          if [ -f "node_modules/better-sqlite3/build/Release/better_sqlite3.node" ]; then
            NODE_FILE="node_modules/better-sqlite3/build/Release/better_sqlite3.node"
          else
            # 2. Search deeper (prebuildify can nest it)
            NODE_FILE=$(find node_modules/better-sqlite3 -name "better_sqlite3.node" -type f | head -n 1 || true)
          fi
          NEEDS_REBUILD="1"
          if [ -n "$NODE_FILE" ] && [ -f "$NODE_FILE" ]; then
            # Try to dlopen it via Node — if it loads, it matches this runner.
            if node -e "
              try { process.dlopen({ exports: {} }, '$NODE_FILE'); console.log('OK'); }
              catch(e) { console.log('MISMATCH:' + e.message); }
            " 2>/dev/null | grep -q '^OK$'; then
              NEEDS_REBUILD="0"
            fi
          fi
          echo "needs_rebuild=$NEEDS_REBUILD" >> "$GITHUB_OUTPUT"

      - name: Rebuild better-sqlite3 from source
        if: steps.check-binary.outputs.needs_rebuild == '1'
        shell: bash
        run: npm rebuild better-sqlite3 --build-from-source

      # Locate the compiled .node file and stage it inside a dir matching
      # the <platform>-<arch> layout that postinstall.mjs expects.
      - name: Stage native binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p prebuilds/${{ matrix.platform }}-${{ matrix.arch }}
          NODE_FILE="node_modules/better-sqlite3/build/Release/better_sqlite3.node"
          if [ ! -f "$NODE_FILE" ]; then
            NODE_FILE=$(find node_modules/better-sqlite3 -name "better_sqlite3.node" -type f | head -n 1)
          fi
          if [ -z "$NODE_FILE" ] || [ ! -f "$NODE_FILE" ]; then
            echo "::error::Could not find better_sqlite3.node"
            exit 1
          fi
          echo "Native binary: $NODE_FILE"
          cp "$NODE_FILE" "prebuilds/${{ matrix.platform }}-${{ matrix.arch }}/better_sqlite3.node"
          file "prebuilds/${{ matrix.platform }}-${{ matrix.arch }}/better_sqlite3.node"
          ls -lh "prebuilds/${{ matrix.platform }}-${{ matrix.arch }}/"

      # ⚠️ Upload with per-platform artifact names AND full subtree
      # (prebuilds/<platform>-<arch>/better_sqlite3.node) so that
      # download-artifact in build-tarball reconstructs the same tree.
      - name: Upload native prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilds/
          if-no-files-found: error

  # ------------------------------------------------------------------
  # 2. Main release job (your existing logic, extended).
  # ------------------------------------------------------------------
  build-tarball:
    name: Build and publish release tarball
    needs: prebuild-native
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CACHE_PATHS: |
        coverage/
        logs/
        node_modules/
        tmp/
        .build/
        dist/
      # Cache key cannot live in env — runner.os and hashFiles are not
      # available in the jobs.env context. Inline in each cache step.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: "💾 Restore cache"
        uses: actions/cache/restore@v4
        id: cache
        continue-on-error: true
        with:
          path: ${{ env.CACHE_PATHS }}
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json', 'src/**/*.{js,ts,tsx,mjs,cjs}', 'open-sse/**/*.{js,ts,mjs,cjs}', 'scripts/**/*.{js,ts,mjs,cjs}', 'db/**/*', 'next.config.mjs', 'tsconfig*.json', 'postcss.config.*', 'tailwind.config.*') }}
          restore-keys: |
            nextjs-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # ================================================================
      # Pull in cross-platform prebuild artifacts. Each artifact was
      # uploaded with its full prebuilds/<platform>-<arch>/ tree, so we
      # download them separately and merge into a single prebuilds/ dir
      # matching what postinstall.mjs scans (lines 90-94).
      # ================================================================
      - name: Download prebuilt native artifacts
        uses: actions/download-artifact@v4
        with:
          path: _prebuilds/

      - name: Merge prebuild artifacts into prebuilds/
        run: |
          set -euo pipefail
          mkdir -p prebuilds
          # Each subdir under _prebuilds/ is a platform artifact (e.g.
          # prebuild-linux-x64/), which itself contains prebuilds/<platform>-<arch>/.
          # Merge by copying each platform's prebuilds subdir into the
          # top-level prebuilds/ so postinstall.mjs finds them.
          for ARTIFACT in _prebuilds/*/; do
            [ -d "$ARTIFACT" ] || continue
            # Copy the prebuilds/<platform>/ subtree
            cp -r "${ARTIFACT}prebuilds/"* prebuilds/ 2>/dev/null || true
          done
          echo "Prebuilds merged:"
          ls -R prebuilds/
          rm -rf _prebuilds/

      - name: Generate CI .env
        run: node scripts/build-env-ci.mjs

      - name: Build CLI payload
        run: npm run build:release
        env:
          CI: "true"

      - name: Pack tarball
        run: |
          mkdir -p release
          npm pack --silent --pack-destination ./release
          mv "release/omniroute-$(node -p "require('./package.json').version").tgz" release/omniroute.tgz
          sha256sum release/omniroute.tgz > release/checksum.txt
          ls -lh release/
          cat release/checksum.txt

      - name: "💾 Save cache"
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CACHE_PATHS }}
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json', 'src/**/*.{js,ts,tsx,mjs,cjs}', 'open-sse/**/*.{js,ts,mjs,cjs}', 'scripts/**/*.{js,ts,mjs,cjs}', 'db/**/*', 'next.config.mjs', 'tsconfig*.json', 'postcss.config.*', 'tailwind.config.*') }}

      - name: "🧹 Remove last github cache entry"
        continue-on-error: true
        if: ${{ !cancelled() }}
        run: npx --legacy-peer-deps -y
          binary-collections@https://github.com/dimaslanjaka/bin/raw/9688287aecab1a125de2d63fdd30651017a9862e/releases/bin.tgz clean-github-actions-cache
          --repo "${{ github.repository }}" --sha "${{ github.sha }}"

      - name: "🧹 Daily cleanup (dist/ .build/ — once per 24h)"
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p tmp
          NOW=$(date +%s)
          LAST=0
          if [ -f tmp/last-clean.txt ]; then
            LAST=$(cat tmp/last-clean.txt 2>/dev/null || echo 0)
          fi
          ELAPSED=$((NOW - LAST))
          THRESHOLD=86400
          echo "[clean] last=$(date -u -d "@${LAST}" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || echo never) elapsed=${ELAPSED}s threshold=${THRESHOLD}s"
          if [ "${ELAPSED}" -lt "${THRESHOLD}" ]; then
            echo "[clean] skipped (within 24h of last clean)"
            exit 0
          fi
          echo "[clean] running — purging dist/, .build/, node_modules/.cache"
          rm -rf dist/ .build/ node_modules/.cache 2>/dev/null || true
          rm -rf open-sse/dist open-sse/.build 2>/dev/null || true
          echo "${NOW}" > tmp/last-clean.txt
          echo "[clean] done — next eligible clean in 24h"

      - name: Verify tarball install and CLI
        run: |
          set -euo pipefail
          npm exec --yes --package ./release/omniroute.tgz -- omniroute --help 2>&1 | tee /tmp/omniroute-help.txt
          grep -qi "usage" /tmp/omniroute-help.txt

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="ci-build"

          # Delete the previous release and its associated tag.
          # This is safe because the release is purely a CI artifact.
          # (ignore errors on first run when the release does not yet exist)
          gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true
          # Extra safety: ensure the tag is gone even if it existed without a release
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # Recreate the release at the current commit with the new tarball.
          # The download URL never changes:
          # https://github.com/OWNER/REPO/releases/download/ci-build/omniroute.tgz
          gh release create "$TAG" \
            --target ${{ github.sha }} \
            --title "CI Build ($(date +%Y-%m-%d))" \
             --notes "Automated build from commit [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\
             Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}." \
             ./release/omniroute.tgz \
             ./release/checksum.txt
